<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZY AGP Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .easyjet-orange { background-color: #ff6600; }
        .easyjet-text { color: #ff6600; }
        input[type="time"], input[type="date"] { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="easyjet-orange text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter">easyJet AGP</h1>
            <div id="live-clock" class="text-xs font-mono bg-black/20 px-2 py-1 rounded">00:00</div>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-gray-100">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Fecha de Turno</label>
                    <input type="date" id="dateInput" class="w-full border-b-2 border-gray-100 p-2 font-bold focus:border-orange-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Inicio</label>
                    <input type="time" id="startTime" class="w-full border-b-2 border-gray-100 p-2 font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Fin</label>
                    <input type="time" id="endTime" class="w-full border-b-2 border-gray-100 p-2 font-bold outline-none">
                </div>
            </div>

            <div class="flex gap-2 mb-4">
                <button onclick="setFranja(2)" class="flex-1 text-[10px] bg-gray-100 py-2 rounded-full font-bold hover:bg-orange-100">+2H</button>
                <button onclick="setFranja(4)" class="flex-1 text-[10px] bg-gray-100 py-2 rounded-full font-bold hover:bg-orange-100">+4H</button>
                <button onclick="setFranja(6)" class="flex-1 text-[10px] bg-gray-100 py-2 rounded-full font-bold hover:bg-orange-100">+6H</button>
            </div>
            
            <button onclick="consultar()" id="btnMain" class="w-full easyjet-orange text-white font-black py-4 rounded-xl shadow-orange-200 shadow-lg active:scale-95 transition-all uppercase text-sm">
                Actualizar Vista
            </button>
        </div>

        <div id="status-msg" class="text-center text-xs text-gray-400 mb-4 hidden">Consultando espacio aéreo...</div>

        <div class="space-y-6">
            <section>
                <h3 class="text-blue-600 font-black text-xs tracking-widest mb-3 flex items-center">
                    <span class="bg-blue-600 text-white px-2 py-0.5 rounded mr-2">ARR</span> LLEGADAS
                </h3>
                <div id="llegadas-list" class="space-y-3"></div>
            </section>

            <section>
                <h3 class="text-green-600 font-black text-xs tracking-widest mb-3 flex items-center">
                    <span class="bg-green-600 text-white px-2 py-0.5 rounded mr-2">DEP</span> SALIDAS
                </h3>
                <div id="salidas-list" class="space-y-3"></div>
            </section>
        </div>
    </main>

    <script>
        const aeropuertos = {'EGKK':'LGW','EGSS':'STN','EGGW':'LTN','EGCC':'MAN','EGPF':'GLA','EGPH':'EDI','EGPB':'BFS','LFLL':'LYS','LFMN':'NCE','LFPG':'CDG','EDDB':'BER','LSZH':'ZRH','LEMG':'AGP','LFSB':'BSL','EGBB':'BHX','LIRF':'FCO','LIMC':'MXP','LPPT':'LIS'};

        // Inicialización automática
        window.onload = () => {
            const ahora = new Date();
            document.getElementById('dateInput').valueAsDate = ahora;
            
            const h = ahora.getHours().toString().padStart(2, '0');
            const m = ahora.getMinutes().toString().padStart(2, '0');
            document.getElementById('startTime').value = `${h}:${m}`;
            
            setFranja(2); // Por defecto 2 horas
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
            consultar(); // Carga automática inicial
        };

        function actualizarReloj() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }

        function setFranja(horas) {
            const inicio = document.getElementById('startTime').value;
            if(!inicio) return;
            const [h, m] = inicio.split(':');
            const fin = new Date();
            fin.setHours(parseInt(h) + horas);
            fin.setMinutes(parseInt(m));
            document.getElementById('endTime').value = `${fin.getHours().toString().padStart(2,'0')}:${fin.getMinutes().toString().padStart(2,'0')}`;
        }

        async function consultar() {
            const btn = document.getElementById('btnMain');
            const msg = document.getElementById('status-msg');
            const date = document.getElementById('dateInput').value;
            const startH = document.getElementById('startTime').value;
            const endH = document.getElementById('endTime').value;

            const startTs = Math.floor(new Date(`${date}T${startH}`).getTime() / 1000);
            const endTs = Math.floor(new Date(`${date}T${endH}`).getTime() / 1000);

            btn.disabled = true;
            msg.classList.remove('hidden');

            try {
                // Usamos un proxy diferente para evitar bloqueos
                const proxy = "https://thingproxy.freeboard.io/fetch/";
                const base = "https://opensky-network.org/api/flights";
                
                const [rArr, rDep] = await Promise.all([
                    fetch(`${proxy}${base}/arrival?airport=LEMG&begin=${startTs}&end=${endTs}`),
                    fetch(`${proxy}${base}/departure?airport=LEMG&begin=${startTs}&end=${endTs}`)
                ]);

                const dArr = await rArr.json();
                const dDep = await rDep.json();

                render(dArr, 'llegadas-list', 'ARR');
                render(dDep, 'salidas-list', 'DEP');
            } catch (e) {
                alert("Servidor ocupado. Reintentando de forma automática...");
                setTimeout(consultar, 3000);
            } finally {
                btn.disabled = false;
                msg.classList.add('hidden');
            }
        }

        function render(data, id, type) {
            const container = document.getElementById(id);
            container.innerHTML = "";
            const easy = data.filter(f => f.callsign && (f.callsign.trim().startsWith('EZY') || f.callsign.trim().startsWith('EJU')));

            if(easy.length === 0) {
                container.innerHTML = "<div class='text-[10px] text-gray-400 py-4 border-2 border-dashed rounded-xl text-center'>SIN MOVIMIENTOS</div>";
                return;
            }

            easy.forEach(v => {
                const ts = type === 'ARR' ? v.lastSeen : v.firstSeen;
                const h = new Date(ts * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const origen = aeropuertos[v.estDepartureAirport] || v.estDepartureAirport || '???';
                const destino = aeropuertos[v.estArrivalAirport] || v.estArrivalAirport || '???';
                const ahora = Math.floor(Date.now()/1000);
                const isPast = ahora > ts;

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                        <div>
                            <div class="easyjet-text font-black text-xl leading-none">${v.callsign.trim()}</div>
                            <div class="text-[10px] font-bold text-gray-400 mt-1">${origen} ➔ ${destino}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-gray-800 text-lg leading-none">${h}</div>
                            <div class="mt-1 text-[8px] font-bold px-2 py-0.5 rounded-full inline-block ${isPast ? 'bg-gray-100 text-gray-400' : 'bg-green-100 text-green-600 animate-pulse'}">
                                ${isPast ? 'EN TIERRA' : 'EN RUTA'}
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
