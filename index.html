<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EZY AGP Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <header class="bg-[#ff6600] text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-black italic">easyJet AGP</h1>
        <div id="live-clock" class="text-xs font-mono bg-black/20 px-2 py-1 rounded">00:00:00</div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div class="bg-white p-5 rounded-3xl shadow-sm mb-6 border border-gray-200">
            <div class="space-y-4 mb-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Día de Operación</label>
                    <input type="date" id="dateInput" class="w-full border-b-2 p-2 font-bold outline-none focus:border-[#ff6600] bg-transparent">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Inicio (Redondeado)</label>
                        <input type="time" id="startTime" class="w-full border-b-2 p-2 font-bold outline-none bg-transparent">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Fin</label>
                        <input type="time" id="endTime" class="w-full border-b-2 p-2 font-bold outline-none bg-transparent">
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 mb-5">
                <button onclick="setFranja(2)" class="flex-1 bg-gray-50 py-2 rounded-xl text-[10px] font-black border border-gray-200">+2H</button>
                <button onclick="setFranja(4)" class="flex-1 bg-gray-50 py-2 rounded-xl text-[10px] font-black border border-gray-200">+4H</button>
                <button onclick="setFranja(6)" class="flex-1 bg-gray-50 py-2 rounded-xl text-[10px] font-black border border-gray-200">+6H</button>
            </div>

            <button onclick="consultar()" id="btnMain" class="w-full bg-[#ff6600] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-sm">
                Actualizar Datos
            </button>
        </div>

        <div id="loader" class="text-center hidden mb-4 font-black text-[#ff6600] text-xs animate-pulse">SINCRONIZANDO CON AGP...</div>

        <div class="space-y-8">
            <section>
                <h3 class="text-blue-600 font-black text-xs mb-3 flex items-center px-1 uppercase tracking-widest">Llegadas <hr class="ml-2 flex-grow border-blue-100"></h3>
                <div id="llegadas-list" class="space-y-2"></div>
            </section>
            <section>
                <h3 class="text-green-600 font-black text-xs mb-3 flex items-center px-1 uppercase tracking-widest">Salidas <hr class="ml-2 flex-grow border-green-100"></h3>
                <div id="salidas-list" class="space-y-2"></div>
            </section>
        </div>
    </main>

    <script>
        const aeropuertos = {'EGKK':'LGW','EGSS':'STN','EGGW':'LTN','EGCC':'MAN','EGPF':'GLA','EGPH':'EDI','EGPB':'BFS','LFLL':'LYS','LFMN':'NCE','LFPG':'CDG','EDDB':'BER','LSZH':'ZRH','LEMG':'AGP','LFSB':'BSL','EGBB':'BHX','LIRF':'FCO','LIMC':'MXP','LPPT':'LIS'};

        window.onload = () => {
            const ahora = new Date();
            document.getElementById('dateInput').valueAsDate = ahora;
            
            // Redondeo solicitado: 00:03 -> 00:00
            const h = ahora.getHours().toString().padStart(2,'0');
            document.getElementById('startTime').value = `${h}:00`;
            
            setFranja(2); // Por defecto franja de 2 horas
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
            consultar(); 
        };

        function actualizarReloj() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('es-ES', {hour12:false});
        }

        function setFranja(horas) {
            const start = document.getElementById('startTime').value;
            const [h, m] = start.split(':');
            let fin = new Date();
            fin.setHours(parseInt(h) + horas);
            fin.setMinutes(parseInt(m));
            document.getElementById('endTime').value = fin.getHours().toString().padStart(2,'0') + ":" + fin.getMinutes().toString().padStart(2,'0');
        }

        async function consultar() {
            const btn = document.getElementById('btnMain');
            const loader = document.getElementById('loader');
            const date = document.getElementById('dateInput').value;
            const sH = document.getElementById('startTime').value;
            const eH = document.getElementById('endTime').value;

            const sTs = Math.floor(new Date(`${date}T${sH}`).getTime() / 1000);
            const eTs = Math.floor(new Date(`${date}T${eH}`).getTime() / 1000);

            // URL DE TU WORKER DESPLEGADO
            const MI_PROXY = "https://ezy.alex198946.workers.dev/"; 

            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const api = "https://opensky-network.org/api/flights";
                // Añadimos el parámetro ?url= para que el worker lo procese
                const urlA = `${MI_PROXY}?url=${encodeURIComponent(api + '/arrival?airport=LEMG&begin=' + sTs + '&end=' + eTs)}`;
                const urlD = `${MI_PROXY}?url=${encodeURIComponent(api + '/departure?airport=LEMG&begin=' + sTs + '&end=' + eTs)}`;

                const [resA, resD] = await Promise.all([fetch(urlA), fetch(urlD)]);
                const d1 = await resA.json();
                const d2 = await resD.json();

                render(d1, 'llegadas-list', 'ARR');
                render(d2, 'salidas-list', 'DEP');
            } catch (e) {
                alert("Error al conectar con el servidor de vuelos.");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        function render(data, id, type) {
            const container = document.getElementById(id);
            container.innerHTML = "";
            const easy = (data || []).filter(f => f.callsign && (f.callsign.trim().startsWith('EZY') || f.callsign.trim().startsWith('EJU')));
            
            if(easy.length === 0) return container.innerHTML = "<div class='text-[10px] text-gray-400 text-center py-4'>SIN VUELOS PROGRAMADOS</div>";

            easy.sort((a,b) => (type === 'ARR' ? a.lastSeen - b.lastSeen : a.firstSeen - b.firstSeen));

            easy.forEach(v => {
                const ts = type === 'ARR' ? v.lastSeen : v.firstSeen;
                const h = new Date(ts * 1000).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', hour12:false});
                const origen = aeropuertos[v.estDepartureAirport] || v.estDepartureAirport || '???';
                const destino = aeropuertos[v.estArrivalAirport] || v.estArrivalAirport || '???';
                const ahora = Math.floor(Date.now()/1000);

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                        <div>
                            <div class="font-black text-[#ff6600] text-lg leading-none">${v.callsign.trim()}</div>
                            <div class="text-[9px] font-bold text-gray-400 uppercase mt-1">${origen} ➔ ${destino}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-gray-800 text-lg leading-none">${h}</div>
                            <div class="mt-1 text-[8px] font-bold px-2 py-0.5 rounded-full inline-block ${ahora > ts ? 'bg-gray-100 text-gray-400' : 'bg-green-100 text-green-600 animate-pulse'}">
                                ${ahora > ts ? 'FINALIZADO' : 'EN RUTA'}
                            </div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
