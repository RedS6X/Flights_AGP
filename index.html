<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>AGP EasyJet Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            easy: {
              orange: "#ff6600",
              light: "#fff7f2",
              dark: "#e65c00"
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="min-h-screen">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-20">
      <div class="max-w-6xl mx-auto px-4 py-4">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h1 class="text-xl font-bold text-easy-orange">EasyJet AGP Live</h1>
            <p class="text-sm text-gray-500">Monitor de vuelos EZY / EJU en Málaga</p>
          </div>
          <div class="text-right">
            <div id="lastUpdate" class="text-xs text-gray-500">—</div>
            <div id="statusLine" class="text-xs font-medium text-gray-600">Listo</div>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-4 space-y-4">
      <section class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Día de operación</label>
            <input id="opDate" type="date" class="w-full rounded-xl border-gray-300 focus:border-easy-orange focus:ring-easy-orange" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Hora inicio</label>
            <input id="startHour" type="time" step="3600" class="w-full rounded-xl border-gray-300 focus:border-easy-orange focus:ring-easy-orange" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Hora fin</label>
            <input id="endHour" type="time" step="3600" class="w-full rounded-xl border-gray-300 focus:border-easy-orange focus:ring-easy-orange" />
          </div>
          <div class="flex items-end">
            <button id="refreshBtn" class="w-full rounded-xl bg-easy-orange hover:bg-easy-dark text-white font-semibold py-2.5 transition">
              Actualizar
            </button>
          </div>
        </div>
        <p class="mt-3 text-xs text-gray-500">
          Al cargar, la hora de inicio se redondea automáticamente a la hora en punto actual.
        </p>
      </section>

      <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="bg-white rounded-2xl shadow-sm border border-blue-200 overflow-hidden">
          <div class="px-4 py-3 bg-blue-600 text-white font-bold">LLEGADAS</div>
          <div id="arrivals" class="p-4 space-y-3"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-green-200 overflow-hidden">
          <div class="px-4 py-3 bg-green-600 text-white font-bold">SALIDAS</div>
          <div id="departures" class="p-4 space-y-3"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // IMPORTANTE: coloca aquí la URL de tu Cloudflare Worker.
    const WORKER_URL = "https://TU-WORKER.tuusuario.workers.dev";
    const AGP = "LEMG";
    const EZY_RE = /\b(EZY|EJU)[A-Z0-9]{1,5}\b/i;

    const AIRPORTS = {
      LEMG: "Málaga",
      EGKK: "London Gatwick",
      LFMN: "Nice",
      LFPG: "Paris Charles de Gaulle",
      LFPO: "Paris Orly",
      LEBL: "Barcelona",
      LEPA: "Palma de Mallorca",
      LIRF: "Rome Fiumicino",
      LOWW: "Vienna",
      EHAM: "Amsterdam Schiphol",
      EDDL: "Düsseldorf",
      EDDM: "Munich",
      EDDF: "Frankfurt",
      EIDW: "Dublin",
      EGLL: "London Heathrow",
      EGSS: "London Stansted",
      ESSA: "Stockholm Arlanda",
      KJFK: "New York JFK",
      LCLK: "Larnaca",
      LPPT: "Lisbon",
      LSZH: "Zurich"
    };

    const $ = (id) => document.getElementById(id);

    function pad(n) { return String(n).padStart(2, "0"); }

    function roundNowToHour() {
      const d = new Date();
      d.setMinutes(0, 0, 0);
      return d;
    }

    function setDefaultFilters() {
      const now = new Date();
      const today = new Date(now);
      $("opDate").value = today.toISOString().slice(0, 10);
      const rounded = roundNowToHour();
      $("startHour").value = `${pad(rounded.getHours())}:00`;
      const end = new Date(rounded.getTime() + 6 * 60 * 60 * 1000);
      $("endHour").value = `${pad(end.getHours())}:00`;
    }

    function timeStr(ts) {
      const d = new Date(ts * 1000);
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function dateTimeToUnix(dateStr, timeStrVal) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const [hh, mm] = timeStrVal.split(":").map(Number);
      return Math.floor(new Date(y, m - 1, d, hh, mm, 0, 0).getTime() / 1000);
    }

    function airportLabel(code) {
      return AIRPORTS[code] || code || "—";
    }

    function normalizeCallsign(raw) {
      if (!raw) return "";
      return String(raw).trim().replace(/\s+/g, "");
    }

    function isEasyJetFlight(callsign) {
      return EZY_RE.test(callsign || "");
    }

    function flightStatus(f) {
      const now = Date.now() / 1000;
      if (f.estArrivalAirport && f.estDepartureAirport && f.lastSeen) {
        return now < (f.lastSeen + 1800) ? "EN RUTA" : "FINALIZADO";
      }
      if (f.arrival && f.arrivalTime && now < f.arrivalTime + 1800) return "EN RUTA";
      return "FINALIZADO";
    }

    function flightCard(f, kind) {
      const code = normalizeCallsign(f.callsign || f[1] || "");
      const origin = airportLabel(f.estDepartureAirport || f.origin || f.departureAirport || f[4] || "");
      const dest = airportLabel(f.estArrivalAirport || f.destination || f.arrivalAirport || f[5] || "");
      const sched = f.scheduleTime || f.departureTime || f.arrivalTime || f.lastSeen || f.time_position || 0;
      const status = flightStatus(f);
      const badge = status === "EN RUTA"
        ? "bg-amber-100 text-amber-800"
        : "bg-gray-200 text-gray-700";

      return `
        <div class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-sm font-bold text-easy-orange">${code || "EZY/EJU"}</div>
              <div class="mt-1 text-sm text-gray-700">${origin} ➔ ${dest}</div>
              <div class="mt-1 text-xs text-gray-500">Programada: ${sched ? timeStr(sched) : "—"}</div>
            </div>
            <span class="shrink-0 rounded-full px-3 py-1 text-xs font-semibold ${badge}">
              ${status}
            </span>
          </div>
        </div>
      `;
    }

    function renderList(el, items, kind) {
      if (!items.length) {
        el.innerHTML = `
          <div class="rounded-xl border border-dashed border-gray-300 p-4 text-sm text-gray-500">
            Sin vuelos para este rango.
          </div>
        `;
        return;
      }
      el.innerHTML = items.map(f => flightCard(f, kind)).join("");
    }

    async function apiFetch(path) {
      const url = `${WORKER_URL}?url=${encodeURIComponent(path)}`;
      const res = await fetch(url, { mode: "cors" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function loadFlights() {
      $("statusLine").textContent = "Cargando...";
      const date = $("opDate").value;
      const start = dateTimeToUnix(date, $("startHour").value);
      const end = dateTimeToUnix(date, $("endHour").value);

      const arrivalsUrl = `https://opensky-network.org/api/flights/arrival?airport=${AGP}&begin=${start}&end=${end}`;
      const departuresUrl = `https://opensky-network.org/api/flights/departure?airport=${AGP}&begin=${start}&end=${end}`;

      const [arrivalsRaw, departuresRaw] = await Promise.allSettled([
        apiFetch(arrivalsUrl),
        apiFetch(departuresUrl)
      ]);

      const arrivals = arrivalsRaw.status === "fulfilled" ? (arrivalsRaw.value || []) : [];
      const departures = departuresRaw.status === "fulfilled" ? (departuresRaw.value || []) : [];

      const filteredArrivals = arrivals.filter(f => isEasyJetFlight(normalizeCallsign(f.callsign || "")) || isEasyJetFlight(f.callsign || f[1] || ""));
      const filteredDepartures = departures.filter(f => isEasyJetFlight(normalizeCallsign(f.callsign || "")) || isEasyJetFlight(f.callsign || f[1] || ""));

      renderList($("arrivals"), filteredArrivals, "arrival");
      renderList($("departures"), filteredDepartures, "departure");
      $("lastUpdate").textContent = `Actualizado: ${new Date().toLocaleTimeString("es-ES")}`;
      $("statusLine").textContent = "Listo";
    }

    $("refreshBtn").addEventListener("click", () => loadFlights().catch(err => {
      $("statusLine").textContent = "Error";
      $("arrivals").innerHTML = `<div class="text-sm text-red-600">Error cargando llegadas: ${err.message}</div>`;
      $("departures").innerHTML = `<div class="text-sm text-red-600">Error cargando salidas: ${err.message}</div>`;
    }));

    ["opDate", "startHour", "endHour"].forEach(id => {
      $(id).addEventListener("change", () => {});
    });

    setDefaultFilters();
    loadFlights().catch(err => {
      $("statusLine").textContent = "Error";
      $("arrivals").innerHTML = `<div class="text-sm text-red-600">Error inicial: ${err.message}</div>`;
      $("departures").innerHTML = `<div class="text-sm text-red-600">Error inicial: ${err.message}</div>`;
    });
  </script>
</body>
</html>
