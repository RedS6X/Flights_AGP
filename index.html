<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyJet AGP - Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .easyjet-orange { background-color: #ff6600; }
        .easyjet-text { color: #ff6600; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="easyjet-orange text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-bold flex justify-between items-center">
            <span>EZY Monitor AGP</span>
            <span id="status-dot" class="h-3 w-3 bg-green-400 rounded-full border-2 border-white"></span>
        </h1>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border-t-4 border-orange-500">
            <h2 class="font-bold text-gray-700 mb-3 text-sm uppercase">Configurar Turno</h2>
            
            <div class="mb-4">
                <label class="block text-xs text-gray-500 font-bold mb-1">FECHA:</label>
                <input type="date" id="dateInput" class="w-full border rounded p-3 bg-gray-50">
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-xs text-gray-500 font-bold mb-1">HORA INICIO:</label>
                    <input type="time" id="startTime" class="w-full border rounded p-3 bg-gray-50">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 font-bold mb-1">HORA FIN:</label>
                    <input type="time" id="endTime" class="w-full border rounded p-3 bg-gray-50">
                </div>
            </div>
            
            <button onclick="consultarVuelos()" id="btnMain" class="w-full easyjet-orange text-white font-black py-4 rounded-lg shadow-md active:scale-95 transition-all uppercase tracking-wider">
                Actualizar Vuelos
            </button>
        </div>

        <div class="space-y-8">
            <section>
                <h3 class="text-blue-600 font-black mb-3 flex items-center">
                    <span class="mr-2">LLEGADAS</span> <hr class="flex-grow border-blue-200">
                </h3>
                <div id="llegadas-list" class="space-y-3"></div>
            </section>

            <section>
                <h3 class="text-green-600 font-black mb-3 flex items-center">
                    <span class="mr-2">SALIDAS</span> <hr class="flex-grow border-green-200">
                </h3>
                <div id="salidas-list" class="space-y-3"></div>
            </section>
        </div>
    </main>

    <script>
        // Diccionario de aeropuertos comunes para easyJet en Málaga
        const aeropuertos = {
            'EGKK': 'LGW', 'EGSS': 'STN', 'EGGW': 'LTN', 'EGCC': 'MAN', 
            'EGPF': 'GLA', 'EGPH': 'EDI', 'EGPB': 'BFS', 'LFLL': 'LYS',
            'LFMN': 'NCE', 'LFPG': 'CDG', 'EDDB': 'BER', 'LSZH': 'ZRH',
            'LEMG': 'AGP', 'LFSB': 'BSL', 'EGBB': 'BHX', 'EGCN': 'DSA',
            'LPPT': 'LIS', 'LPPR': 'OPO', 'LIRF': 'FCO', 'LIMC': 'MXP'
        };

        // Ponemos la fecha de hoy por defecto
        document.getElementById('dateInput').valueAsDate = new Date();

        async function consultarVuelos() {
            const btn = document.getElementById('btnMain');
            const date = document.getElementById('dateInput').value;
            const startH = document.getElementById('startTime').value;
            const endH = document.getElementById('endTime').value;

            if (!date || !startH || !endH) return alert("Completa la fecha y las horas.");

            // Convertir a Unix Timestamp
            const startTs = Math.floor(new Date(`${date}T${startH}`).getTime() / 1000);
            const endTs = Math.floor(new Date(`${date}T${endH}`).getTime() / 1000);

            btn.innerText = "CONECTANDO...";
            btn.disabled = true;

            try {
                // Usamos AllOrigins para saltar el bloqueo de CORS
                const proxy = "https://api.allorigins.win/get?url=";
                const urlArr = encodeURIComponent(`https://opensky-network.org/api/flights/arrival?airport=LEMG&begin=${startTs}&end=${endTs}`);
                const urlDep = encodeURIComponent(`https://opensky-network.org/api/flights/departure?airport=LEMG&begin=${startTs}&end=${endTs}`);

                const [resArr, resDep] = await Promise.all([
                    fetch(proxy + urlArr),
                    fetch(proxy + urlDep)
                ]);

                const dataArr = await resArr.json();
                const dataDep = await resDep.json();

                renderList(JSON.parse(dataArr.contents), 'llegadas-list', 'ARR');
                renderList(JSON.parse(dataDep.contents), 'salidas-list', 'DEP');

            } catch (e) {
                console.error(e);
                alert("Error al obtener datos. Inténtalo de nuevo en unos segundos.");
            } finally {
                btn.innerText = "ACTUALIZAR VUELOS";
                btn.disabled = false;
            }
        }

        function renderList(data, elementId, type) {
            const container = document.getElementById(elementId);
            container.innerHTML = "";

            if (!data || data.length === 0) {
                container.innerHTML = "<p class='text-xs text-gray-400'>No hay vuelos registrados en esta franja.</p>";
                return;
            }

            const filtrados = data.filter(f => 
                f.callsign && (f.callsign.trim().startsWith('EZY') || f.callsign.trim().startsWith('EJU'))
            );

            if (filtrados.length === 0) {
                container.innerHTML = "<p class='text-xs text-gray-400 italic font-medium'>No hay vuelos de EasyJet programados.</p>";
                return;
            }

            filtrados.forEach(v => {
                const timestamp = type === 'ARR' ? v.lastSeen : v.firstSeen;
                const hora = new Date(timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const origen = aeropuertos[v.estDepartureAirport] || v.estDepartureAirport || '???';
                const destino = aeropuertos[v.estArrivalAirport] || v.estArrivalAirport || '???';
                
                // Lógica visual de estado
                const ahora = Math.floor(Date.now() / 1000);
                const isAparcado = type === 'ARR' && (ahora > v.lastSeen + 300);

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-8 ${type === 'ARR' ? 'border-blue-500' : 'border-green-500'} flex justify-between items-center">
                        <div class="flex-1">
                            <span class="easyjet-text font-black text-xl tracking-tighter">${v.callsign.trim()}</span>
                            <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${origen} ➔ ${destino}</div>
                        </div>
                        <div class="text-right border-l pl-4 border-gray-100">
                            <span class="block font-black text-gray-800 text-lg leading-none mb-1">${hora}</span>
                            <span class="text-[9px] px-2 py-0.5 rounded-full font-bold uppercase ${isAparcado ? 'bg-gray-100 text-gray-400' : 'bg-orange-500 text-white animate-pulse'}">
                                ${isAparcado ? 'P-Asignado' : 'Operando'}
                            </span>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
