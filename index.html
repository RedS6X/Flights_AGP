<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>EasyJet AGP Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            easy: {
              orange: "#ff6600",
              dark: "#e65c00",
              light: "#fff7f2"
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="min-h-screen">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-20">
      <div class="max-w-6xl mx-auto px-4 py-4">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h1 class="text-xl font-bold text-easy-orange">EasyJet AGP Live</h1>
            <p class="text-sm text-gray-500">Vuelos EasyJet en Málaga</p>
          </div>
          <div class="text-right">
            <div id="lastUpdate" class="text-xs text-gray-500">—</div>
            <div id="statusLine" class="text-xs font-medium text-gray-600">Listo</div>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-4 space-y-4">
      <section class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Día de operación</label>
            <input id="opDate" type="date" class="w-full rounded-xl border-gray-300 focus:border-easy-orange focus:ring-easy-orange" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Hora inicio</label>
            <input id="startHour" type="time" step="3600" class="w-full rounded-xl border-gray-300 focus:border-easy-orange focus:ring-easy-orange" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Hora fin</label>
            <input id="endHour" type="time" step="3600" class="w-full rounded-xl border-gray-300 focus:border-easy-orange focus:ring-easy-orange" />
          </div>
          <div class="flex items-end">
            <button id="refreshBtn" class="w-full rounded-xl bg-easy-orange hover:bg-easy-dark text-white font-semibold py-2.5 transition">
              Actualizar
            </button>
          </div>
        </div>
        <p class="mt-3 text-xs text-gray-500">
          Si no hay resultados, la app ampliará automáticamente la ventana de búsqueda.
        </p>
      </section>

      <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="bg-white rounded-2xl shadow-sm border border-blue-200 overflow-hidden">
          <div class="px-4 py-3 bg-blue-600 text-white font-bold">LLEGADAS</div>
          <div id="arrivals" class="p-4 space-y-3"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-green-200 overflow-hidden">
          <div class="px-4 py-3 bg-green-600 text-white font-bold">SALIDAS</div>
          <div id="departures" class="p-4 space-y-3"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const WORKER_URL = "https://ezy.alex198946.workers.dev/";
    const AIRPORT = { iata: "AGP", icao: "LEMG", name: "Málaga" };
    const EASY_RE = /\b(EZY|EJU)[A-Z0-9]{1,5}\b/i;

    const $ = (id) => document.getElementById(id);

    function pad(n) { return String(n).padStart(2, "0"); }

    function roundNowToHour() {
      const d = new Date();
      d.setMinutes(0, 0, 0);
      return d;
    }

    function setDefaults() {
      const now = new Date();
      $("opDate").value = now.toISOString().slice(0, 10);
      const start = roundNowToHour();
      $("startHour").value = `${pad(start.getHours())}:00`;
      const end = new Date(start.getTime() + 8 * 60 * 60 * 1000);
      $("endHour").value = `${pad(end.getHours())}:00`;
    }

    function unixFromInput(dateStr, hm) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const [hh, mm] = hm.split(":").map(Number);
      return Math.floor(new Date(y, m - 1, d, hh, mm, 0, 0).getTime() / 1000);
    }

    function timeStr(ts) {
      const d = new Date(ts * 1000);
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function isEasyJet(callsign) {
      return EASY_RE.test(String(callsign || "").replace(/\s+/g, ""));
    }

    function airportLabel(code) {
      return code || "—";
    }

    function flightStatus(f) {
      const now = Date.now() / 1000;
      const ts = f.lastSeen || f.arrivalTime || f.departureTime || f.firstSeen || 0;
      return now <= ts + 3600 ? "EN RUTA" : "FINALIZADO";
    }

    function card(f) {
      const callsign = String(f.callsign || "").replace(/\s+/g, "") || "EZY/EJU";
      const origin = airportLabel(f.estDepartureAirport || f.departureAirport || "");
      const dest = airportLabel(f.estArrivalAirport || f.arrivalAirport || "");
      const sched = f.departureTime || f.arrivalTime || f.firstSeen || f.lastSeen || 0;
      const status = flightStatus(f);
      const badge = status === "EN RUTA" ? "bg-amber-100 text-amber-800" : "bg-gray-200 text-gray-700";

      return `
        <div class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-sm font-bold text-easy-orange">${callsign}</div>
              <div class="mt-1 text-sm text-gray-700">${origin} ➔ ${dest}</div>
              <div class="mt-1 text-xs text-gray-500">Programada: ${sched ? timeStr(sched) : "—"}</div>
            </div>
            <span class="shrink-0 rounded-full px-3 py-1 text-xs font-semibold ${badge}">${status}</span>
          </div>
        </div>
      `;
    }

    function render(el, flights) {
      if (!flights.length) {
        el.innerHTML = `<div class="rounded-xl border border-dashed border-gray-300 p-4 text-sm text-gray-500">Sin vuelos en este rango.</div>`;
        return;
      }
      el.innerHTML = flights.map(card).join("");
    }

    async function workerFetch(url) {
      const res = await fetch(`${WORKER_URL}?url=${encodeURIComponent(url)}`, { mode: "cors" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function queryFlights(kind, begin, end) {
      const url = `https://opensky-network.org/api/flights/${kind}?airport=${AIRPORT.icao}&begin=${begin}&end=${end}`;
      const data = await workerFetch(url);
      return Array.isArray(data) ? data.filter(f => isEasyJet(f.callsign)) : [];
    }

    async function loadFlights() {
      $("statusLine").textContent = "Cargando...";
      const date = $("opDate").value;
      const begin = unixFromInput(date, $("startHour").value);
      const end = unixFromInput(date, $("endHour").value);

      let [arrivals, departures] = await Promise.all([
        queryFlights("arrival", begin, end),
        queryFlights("departure", begin, end)
      ]);

      if (arrivals.length === 0 && departures.length === 0) {
        const extendedBegin = begin - 4 * 3600;
        const extendedEnd = end + 4 * 3600;
        const extended = await Promise.all([
          queryFlights("arrival", extendedBegin, extendedEnd),
          queryFlights("departure", extendedBegin, extendedEnd)
        ]);
        arrivals = extended[0];
        departures = extended[1];
        $("statusLine").textContent = "Sin datos en rango; ventana ampliada aplicada";
      } else {
        $("statusLine").textContent = "Listo";
      }

      render($("arrivals"), arrivals);
      render($("departures"), departures);
      $("lastUpdate").textContent = `Actualizado: ${new Date().toLocaleTimeString("es-ES")}`;
    }

    $("refreshBtn").addEventListener("click", () => {
      loadFlights().catch(err => {
        $("statusLine").textContent = "Error";
        $("arrivals").innerHTML = `<div class="text-sm text-red-600">Error: ${err.message}</div>`;
        $("departures").innerHTML = `<div class="text-sm text-red-600">Error: ${err.message}</div>`;
      });
    });

    setDefaults();
    loadFlights().catch(err => {
      $("statusLine").textContent = "Error";
      $("arrivals").innerHTML = `<div class="text-sm text-red-600">Error inicial: ${err.message}</div>`;
      $("departures").innerHTML = `<div class="text-sm text-red-600">Error inicial: ${err.message}</div>`;
    });
  </script>
</body>
</html>
